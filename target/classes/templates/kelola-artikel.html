<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelola Artikel | Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Navigasi Utama Admin">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}" th:text="${webName} + ' Admin'">Portal Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto small text-uppercase fw-semibold">
                <li class="nav-item"><a class="nav-link text-white-50" th:href="@{/}">Lihat Website →</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">Manajemen Artikel</h1>
            <p class="text-muted small mb-0">Tambah, ubah, atau hapus artikel berita di sini.</p>
        </div>
        <a th:href="@{/admin/artikel/tambah}" class="btn btn-primary shadow-sm fw-semibold">+ Tambah Artikel</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3" style="width: 5%;">ID</th>
                            <th style="width: 15%;">Kategori</th>
                            <th style="width: 40%;">Judul</th>
                            <th style="width: 15%;">Penulis</th>
                            <th class="text-end pe-3" style="width: 25%;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="art : ${articles}">
                            <td class="ps-3 fw-bold text-secondary" th:text="${art.id}">1</td>
                            <td><span class="badge bg-secondary text-uppercase" th:text="${art.category}">Kategori</span></td>
                            <td class="fw-semibold text-dark" th:text="${art.title}">Judul Artikel</td>
                            <td th:text="${art.author}">Nama Penulis</td>
                            <td class="text-end pe-3">
                                <a th:href="@{/admin/artikel/edit/{id}(id=${art.id})}" class="btn btn-sm btn-outline-warning me-1">Edit</a>
                                <a th:href="@{/admin/artikel/hapus/{id}(id=${art.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Apakah Anda yakin ingin menghapus artikel ini?');">Hapus</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="5" class="text-center py-4 text-muted">Belum ada artikel. Silakan tambah artikel baru.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
