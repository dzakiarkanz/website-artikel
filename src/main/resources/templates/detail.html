<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Judul Tab dinamis mengikuti judul artikel yang sedang dibaca -->
    <title th:text="${article.title} + ' | ' + ${webName}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #212529;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark style" style="background-color: #1e1e24;" aria-label="Navigasi Detail Artikel">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}" th:text="${webName}">Portal</a>
        <div class="collapse navbar-collapse" id="detailNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small text-uppercase fw-semibold">
                <li class="nav-item"><a class="nav-link text-white-50" th:href="@{/}">← Kembali ke Home</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Breadcrumb Navigation -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${article.category}">Kategori</li>
                </ol>
            </nav>

            <!-- Bagian Atas Artikel (Header) -->
            <header class="mb-5">
                <span class="badge bg-primary mb-3 px-3 py-2 text-uppercase fw-bold" th:text="${article.category}">Kategori</span>
                <h1 class="display-5 fw-extrabold mb-3" th:text="${article.title}">Judul Artikel Penuh</h1>
                
                <!-- Metadata Penulis dan Tanggal -->
                <div class="d-flex align-items-center p-3 bg-white rounded border shadow-sm">
                    <div class="meta-info">
                        <div class="fw-bold text-dark mb-0" th:text="'Oleh: ' + ${article.author}">Nama Penulis</div>
                        <small class="text-muted" th:text="'Diterbitkan pada ' + ${article.publishedAt}">Tanggal rilis</small>
                    </div>
                </div>
            </header>

            <!-- Konten Utama Berita -->
            <article class="p-4 p-md-5 bg-white rounded shadow-sm border mb-5">
                <!-- Paragraf Excerpt sebagai lead tulisan (dicetak tebal halus) -->
                <p class="lead fw-medium text-secondary mb-4 border-start border-4 border-primary ps-3" th:text="${article.excerpt}"></p>
                
                <!-- Isi Berita Utama Lengkap -->
                <div class="article-content" th:text="${article.content}">
                    Konten berita utama akan dirender di sini secara utuh dan panjang...
                </div>
            </article>
            
            <!-- Tombol Kembali -->
            <div class="text-center">
                <a th:href="@{/}" class="btn btn-outline-secondary px-4 shadow-sm">Kembali ke Daftar Artikel</a>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-3 text-center small mt-5">
    <div class="container">© 2026 <span th:text="${webName}">Portal</span> | Dibangun dengan Spring Boot & Bootstrap</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
        crossorigin="anonymous"></script>
</body>
</html>
