<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Masuk Akun | Tech Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .login-card { max-width: 400px; width: 100%; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="login-card p-3">
    <div class="text-center mb-3">
        <a th:href="@{/}" class="text-decoration-none text-secondary small">← Kembali ke Beranda</a>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <div class="card-body">
            <h1 class="h4 fw-bold text-center text-dark mb-1" th:text="${webName}">Tech Pulse</h1>
            <p class="text-muted text-center small mb-4">Silakan masuk ke akun Anda</p>

            <div th:if="${errorMessage}" class="alert alert-danger small py-2" th:text="${errorMessage}"></div>

            <div th:if="${logoutMessage}" class="alert alert-success small py-2" th:text="${logoutMessage}"></div>

            <div th:if="${param.success}" class="alert alert-success small py-2">
                Pendaftaran berhasil! Silakan login.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-semibold">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold py-2 shadow-sm">Masuk</button>
            </form>

            <div class="text-center mt-4 pt-2 border-top">
                <p class="text-muted small mb-0">Belum punya akun? <a th:href="@{/register}" class="text-decoration-none fw-medium">Daftar Sekarang</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
