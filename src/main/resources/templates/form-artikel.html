<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | Panel Admin'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Navigasi Form Admin">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/artikel}" th:text="${webName} + ' Admin'">Portal Admin</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="mb-4">
                <a th:href="@{/admin/artikel}" class="text-decoration-none text-secondary">← Kembali ke Manajemen Artikel</a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 fw-bold mb-4 border-bottom pb-3" th:text="${pageTitle}">Tambah Artikel Baru</h1>

                    <form th:action="@{/admin/artikel/simpan}" th:object="${article}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="category" class="form-label fw-semibold small">Kategori Artikel</label>
                            <input type="text" class="form-control" id="category" th:field="*{category}" placeholder="Contoh: JAVA, AI, WEB DEV" required>
                        </div>

                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold small">Judul Artikel</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="Masukkan judul berita utama" required>
                        </div>

                        <div class="mb-3">
                            <label for="author" class="form-label fw-semibold small">Nama Penulis / Jurnalis</label>
                            <input type="text" class="form-control" id="author" th:field="*{author}" placeholder="Nama admin atau penulis" required>
                        </div>

                        <div class="mb-3">
                            <label for="publishedAt" class="form-label fw-semibold small">Tanggal Terbit</label>
                            <input type="text" class="form-control" id="publishedAt" th:field="*{publishedAt}" placeholder="Contoh: 16 Juni 2026" required>
                        </div>

                        <div class="mb-3">
                            <label for="excerpt" class="form-label fw-semibold small">Ringkasan Pendek (Excerpt)</label>
                            <textarea class="form-control" id="excerpt" th:field="*{excerpt}" rows="2" placeholder="Ringkasan pendek yang akan muncul di halaman kartu beranda depan..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="content" class="form-label fw-semibold small">Isi Konten Berita Lengkap</label>
                            <textarea class="form-control" id="content" th:field="*{content}" rows="8" placeholder="Tuliskan seluruh isi teks artikel berita secara mendalam di sini..." required></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/admin/artikel}" class="btn btn-light px-4">Batal</a>
                            <button type="submit" class="btn btn-primary px-5 fw-semibold shadow-sm">Simpan Artikel</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
